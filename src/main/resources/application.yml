server:
  port: 8080
  # Loopback-only: the MCP endpoint is unauthenticated by design (localhost
  # demo); never expose it to the network without adding auth in front.
  address: 127.0.0.1

spring:
  application:
    name: rag-mcp-server
  ai:
    mcp:
      server:
        name: rag-docs
        version: 0.1.0
        protocol: STREAMABLE
        type: SYNC

rag:
  base-url: http://localhost:8000
